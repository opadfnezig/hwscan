x-worker-base: &worker-base
  build: ../olx-scraper
  restart: unless-stopped
  environment: &worker-env
    ROLE: worker
    DOMAIN: olx.ua
    CATEGORY_ID: "38"
    REDIS_URL: redis://redis:6379
    KAFKA_BROKERS: ${KAFKA_BROKERS:-172.16.17.3:9092}
    KAFKA_TOPIC: ${KAFKA_TOPIC:-olx.ua.listings}
    IMAGES_DIR: /data/images
    WORKER_CONCURRENCY: "2"
    SEEN_ID_LIMIT: "5000"
    PLATFORM_NAME: ${PLATFORM_NAME:-olx.ua}
    TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
  volumes:
    - /data/images:/data/images
  depends_on:
    redis:
      condition: service_healthy

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  controller:
    build: ../olx-scraper
    restart: unless-stopped
    environment:
      ROLE: controller
      DOMAIN: olx.ua
      CATEGORY_ID: "38"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS:-172.16.17.3:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-olx.ua.listings}
      SCAN_INTERVAL_MS: "600000"
      IMAGES_DIR: /data/images
      SEEN_ID_LIMIT: "5000"
      PROXY_INDEX: "0"
      PLATFORM_NAME: ${PLATFORM_NAME:-olx.ua}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "3002:3000"
    volumes:
      - /data/images:/data/images
    depends_on:
      redis:
        condition: service_healthy

  worker-0:
    <<: *worker-base
    environment:
      <<: *worker-env
      PROXY_INDEX: "0"

  worker-1:
    <<: *worker-base
    environment:
      <<: *worker-env
      PROXY_INDEX: "1"

  worker-2:
