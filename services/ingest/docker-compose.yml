services:
  ingest:
    build: .
    restart: unless-stopped
    environment:
      PG_URL: ${PG_URL:-postgresql://hw5c4n:${PG_PASSWORD}@172.16.17.3:5432/hw5c4n}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-172.16.17.3:9092}
      KAFKA_GROUP: ${KAFKA_GROUP:-ingest-v1}
      KAFKA_TOPICS: >-
        bazos.cz.listings,bazos.sk.listings,kleinanzeigen.listings,
        olx.ua.listings,olx.pl.listings,tori.listings,aukro.listings
      S3_ENDPOINT: ${S3_ENDPOINT:-http://172.16.17.3:3900}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-hw5c4n-images}
      S3_REGION: ${S3_REGION:-garage}
      SCRAPER_HOST: ${SCRAPER_HOST:-172.16.5.13}
      RECHECK_INTERVAL_H: ${RECHECK_INTERVAL_H:-24}
      RECHECK_BATCH_SIZE: ${RECHECK_BATCH_SIZE:-100}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /data/images:/data/images:ro
