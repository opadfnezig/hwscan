services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  controller:
    build: ../olx-scraper
    restart: unless-stopped
    environment:
      DOMAIN: olx.pl
      CATEGORY_ID: "443"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS:-172.16.17.3:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-olx.pl.listings}
      SCAN_INTERVAL_MS: "600000"
      IMAGES_DIR: /data/images
      SEEN_ID_LIMIT: "5000"
      ANTHILL_URL: ${ANTHILL_URL:-http://172.16.5.13:3100}
      PLATFORM_NAME: ${PLATFORM_NAME:-olx.pl}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "3003:3000"
    volumes:
      - /data/images:/data/images
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
