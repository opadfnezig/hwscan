services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  aukro:
    build: .
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS:-172.16.17.3:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-aukro.listings}
      IMAGES_DIR: /data/images
      CATEGORY_SEO_URL: pocitace-a-hry
      ANTHILL_URL: http://172.16.5.13:3100
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "3006:3000"
    volumes:
      - /data/images:/data/images
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
